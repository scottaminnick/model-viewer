<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Model Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3;
           height: 100vh; display: flex; flex-direction: column; }

    /* ── topbar ── */
    #topbar { display: flex; align-items: center; gap: 10px; padding: 6px 12px;
              background: #161b22; border-bottom: 1px solid #30363d;
              flex-shrink: 0; flex-wrap: wrap; }
    .ctrl-group { display: flex; align-items: center; gap: 4px; }
    .ctrl-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .04em; }
    select { background: #21262d; color: #e6edf3; border: 1px solid #30363d;
             border-radius: 4px; padding: 3px 6px; font-size: 13px; cursor: pointer; }
    select:hover { border-color: #58a6ff; }
    #ready-badge { margin-left: auto; font-size: 11px; color: #3fb950; white-space: nowrap; }

    /* ── hourbar ── */
    #hourbar { display: flex; align-items: center; gap: 2px; padding: 4px 12px;
               background: #0d1117; border-bottom: 1px solid #21262d;
               flex-shrink: 0; overflow-x: auto; }
    #hourbar .hl { font-size: 11px; color: #8b949e; margin-right: 4px; white-space: nowrap; }
    .fxx-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e;
               border-radius: 3px; padding: 2px 6px; font-size: 12px;
               cursor: pointer; white-space: nowrap; }
    .fxx-btn:hover  { border-color: #58a6ff; color: #e6edf3; }
    .fxx-btn.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
    .fxx-btn.loading { border-color: #e3b341; color: #e3b341; }
    .nav-btn { padding: 2px 8px; font-size: 11px; }
    #loop-btn.looping { border-color: #3fb950; color: #3fb950; }
    #loop-speed { background: #21262d; color: #8b949e; border: 1px solid #30363d;
                  border-radius: 3px; padding: 2px 4px; font-size: 11px; cursor: pointer;
                  margin-left: 2px; }
    #loop-speed:hover { border-color: #58a6ff; }
    .hr-spacer { flex: 1; }

    /* ── main / map ── */
    #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    #map  { flex: 1; position: relative; }

    /* ── loading spinner ── */
    #map-loading {
      display: none; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 800; pointer-events: none;
      background: rgba(13,17,23,0.82); border: 1px solid #30363d;
      border-radius: 10px; padding: 18px 28px; text-align: center;
      color: #e6edf3; font-size: 12px; min-width: 120px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-ring {
      width: 28px; height: 28px;
      border: 3px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.75s linear infinite;
      margin: 0 auto 10px;
    }

    /* ── shared overlay base ── */
    .map-overlay {
      position: absolute; z-index: 750; pointer-events: auto;
      background: rgba(13,17,23,0.78); border: 1px solid #30363d;
      border-radius: 7px;
    }

    /* ── model info (top-left, below zoom ctrl) ── */
    #map-info {
      top: 80px; left: 10px;
      padding: 8px 12px; font-size: 12px; line-height: 1.75;
      pointer-events: none;
    }
    #mi-model { font-weight: 700; color: #58a6ff; font-size: 13px; }
    #mi-cycle, #mi-valid { color: #c9d1d9; font-size: 11px; }

    /* ── layer toggles (top-right) ── */
    #map-layer-ctrl {
      top: 80px; right: 10px;
      display: flex; flex-direction: column; gap: 4px;
      padding: 7px 8px;
    }
    .lyr-btn {
      background: transparent; border: 1px solid #30363d; color: #8b949e;
      border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer;
      text-align: center;
    }
    .lyr-btn:hover { border-color: #58a6ff; color: #e6edf3; }
    .lyr-btn.active { border-color: #58a6ff; color: #e6edf3; background: rgba(31,111,235,0.18); }

    /* ── horizontal legend (bottom) ── */
    #map-legend {
      bottom: 24px; left: 10px; right: 135px;
      padding: 6px 10px 5px;
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 3px 0; pointer-events: none;
    }
    .leg-swatch {
      width: 20px; height: 13px; border-radius: 2px; flex-shrink: 0;
    }
    .leg-label {
      font-size: 10px; color: #c9d1d9; white-space: nowrap;
      margin: 0 8px 0 3px;
    }

    /* ── cursor tooltip ── */
    #cursor-tip {
      display: none; position: absolute; z-index: 780; pointer-events: none;
      background: rgba(13,17,23,0.88); border: 1px solid #30363d;
      border-radius: 6px; padding: 6px 10px;
      font-size: 12px; color: #e6edf3; line-height: 1.6; white-space: nowrap;
    }
    #cursor-tip b { color: #58a6ff; }
  </style>
</head>
<body>
<div id="topbar">
  <div class="ctrl-group">
    <span class="ctrl-label">Model</span>
    <select id="sel-model"></select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Product</span>
    <select id="sel-product"></select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Cycle</span>
    <select id="sel-cycle"></select>
  </div>
  <div class="ctrl-group" id="opacity-ctrl">
    <span class="ctrl-label">Opacity</span>
    <input id="opacity-slider" type="range" min="0" max="100" value="85" style="width:80px"/>
    <span id="opacity-val" style="font-size:12px;color:#8b949e;width:32px">85%</span>
  </div>
  <span id="ready-badge">— ready</span>
</div>

<div id="hourbar">
  <span class="hl">HOUR →</span>
</div>

<div id="regionbar" style="display:none; align-items:center; gap:4px; padding:4px 12px;
     background:#0d1117; border-bottom:1px solid #21262d; flex-shrink:0;">
  <span style="font-size:11px; color:#8b949e; margin-right:6px;">REGION →</span>
  <button class="fxx-btn active" data-region="froude_front_range">Front Range</button>
</div>

<div id="main">
  <div id="map">
    <div id="map-loading">
      <div class="spin-ring"></div>
      <div id="map-loading-msg">Rendering…</div>
    </div>

    <div id="map-info" class="map-overlay">
      <div id="mi-model"></div>
      <div id="mi-cycle"></div>
      <div id="mi-valid"></div>
    </div>

    <div id="map-layer-ctrl" class="map-overlay">
      <button class="lyr-btn active" id="lyr-states">States</button>
      <button class="lyr-btn active" id="lyr-artcc">ARTCCs</button>
    </div>

    <div id="map-legend" class="map-overlay"></div>

    <div id="cursor-tip"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const IMAGE_BOUNDS = [[22.0, -126.0], [52.0, -64.0]];
let registry = [], curModel = null, curProduct = null, curCycle = null, curFxx = 1;
let imageOverlay = null, barbOverlay = null, pointsData = null;
let curUnits = "", curValidUtc = "";
let loopActive = false, loopInterval = null;

const map = L.map("map", { keyboard: false }).setView([39, -98], 4);

map.createPane("modelPane");
map.getPane("modelPane").style.zIndex = 300;
map.getPane("modelPane").style.pointerEvents = "none";

const darkGray = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}",
  { attribution: "Tiles © Esri", maxZoom: 16 });
darkGray.addTo(map);

const esriTerrain = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}",
  { attribution: "Tiles © Esri", maxZoom: 13, opacity: 0.65 });
esriTerrain.addTo(map);

const statesLayer = L.geoJSON(null, { style: { color:"#000000", weight:2.5, fill:false, opacity:0.9 } });
fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json")
  .then(r => r.json()).then(gj => statesLayer.addData(gj));
statesLayer.addTo(map);

const artccLayer = L.geoJSON(null, { style: { color:"#ff69b4", weight:2.5, fill:false, dashArray:"5,3", opacity:0.95 } });
fetch("/api/artcc/boundaries").then(r => r.json()).then(gj => artccLayer.addData(gj));
artccLayer.addTo(map);

document.getElementById("lyr-states").addEventListener("click", function() {
  this.classList.toggle("active");
  if (this.classList.contains("active")) {
    statesLayer.addTo(map); statesLayer.bringToFront(); artccLayer.bringToFront();
  } else {
    map.removeLayer(statesLayer);
  }
});

document.getElementById("lyr-artcc").addEventListener("click", function() {
  this.classList.toggle("active");
  if (this.classList.contains("active")) {
    artccLayer.addTo(map); statesLayer.bringToFront(); artccLayer.bringToFront();
  } else {
    map.removeLayer(artccLayer);
  }
});

document.getElementById("opacity-slider").addEventListener("input", e => {
  document.getElementById("opacity-val").textContent = e.target.value + "%";
  if (imageOverlay) imageOverlay.setOpacity(e.target.value / 100);
});

/* ── loop ── */
function startLoop() {
  loopActive = true;
  const lb = document.getElementById("loop-btn");
  if (lb) { lb.textContent = "⏸ Loop"; lb.classList.add("looping"); }
  const delay = parseInt(document.getElementById("loop-speed").value || "1000");
  loopInterval = setInterval(() => {
    const btns = [...document.querySelectorAll(".fxx-btn:not(.nav-btn)")];
    if (!btns.length) return;
    const i = btns.findIndex(b => b.classList.contains("active"));
    btns[(i + 1) % btns.length].click();
  }, delay);
}

function stopLoop() {
  loopActive = false;
  clearInterval(loopInterval);
  loopInterval = null;
  const lb = document.getElementById("loop-btn");
  if (lb) { lb.textContent = "▶ Loop"; lb.classList.remove("looping"); }
}

function toggleLoop() { loopActive ? stopLoop() : startLoop(); }

/* ── hour strip ── */
function renderHourStrip(avail) {
  stopLoop();
  const bar = document.getElementById("hourbar");
  bar.innerHTML = `<span class="hl">HOUR →</span>`;

  const prevBtn = document.createElement("button");
  prevBtn.id = "hr-prev"; prevBtn.className = "fxx-btn nav-btn"; prevBtn.title = "Previous hour";
  prevBtn.textContent = "◀"; bar.appendChild(prevBtn);

  avail.forEach(fxx => {
    const btn = document.createElement("button");
    btn.className = "fxx-btn";
    btn.textContent = `F${String(fxx).padStart(2,"0")}`;
    btn.dataset.fxx = fxx;
    btn.addEventListener("click", () => {
      stopLoop();
      document.querySelectorAll(".fxx-btn:not(.nav-btn)").forEach(b => b.classList.remove("active"));
      btn.classList.add("active","loading");
      loadImage(fxx).then(() => btn.classList.remove("loading"));
    });
    if (fxx === curFxx) btn.classList.add("active");
    bar.appendChild(btn);
  });

  const nextBtn = document.createElement("button");
  nextBtn.id = "hr-next"; nextBtn.className = "fxx-btn nav-btn"; nextBtn.title = "Next hour";
  nextBtn.textContent = "▶"; bar.appendChild(nextBtn);

  const spacer = document.createElement("div");
  spacer.className = "hr-spacer"; bar.appendChild(spacer);

  const loopBtn = document.createElement("button");
  loopBtn.id = "loop-btn"; loopBtn.className = "fxx-btn nav-btn"; loopBtn.title = "Loop forecast hours";
  loopBtn.textContent = "▶ Loop"; loopBtn.onclick = toggleLoop; bar.appendChild(loopBtn);

  const speedSel = document.createElement("select");
  speedSel.id = "loop-speed"; speedSel.title = "Animation speed";
  speedSel.innerHTML = `<option value="2000">0.5×</option><option value="1000" selected>1×</option><option value="500">2×</option>`;
  speedSel.onchange = () => { if (loopActive) { stopLoop(); startLoop(); } };
  bar.appendChild(speedSel);

  document.getElementById("hr-prev").onclick = () => {
    const btns = [...document.querySelectorAll(".fxx-btn:not(.nav-btn)")];
    const i = btns.findIndex(b => b.classList.contains("active"));
    if (i > 0) btns[i-1].click();
  };
  document.getElementById("hr-next").onclick = () => {
    const btns = [...document.querySelectorAll(".fxx-btn:not(.nav-btn)")];
    const i = btns.findIndex(b => b.classList.contains("active"));
    if (i < btns.length-1) btns[i+1].click();
  };
}

/* ── boot / model / product ── */
async function boot() {
  registry = await fetch("/api/products").then(r => r.json());
  const modelSel = document.getElementById("sel-model");
  registry.forEach(m => {
    const o = document.createElement("option");
    o.value = m.model_id; o.textContent = m.label;
    modelSel.appendChild(o);
  });
  modelSel.addEventListener("change", () => onModelChange(modelSel.value));
  await onModelChange(registry[0].model_id);
}

async function onModelChange(modelId) {
  stopLoop();
  curModel = modelId;
  const mDef = registry.find(m => m.model_id === modelId);
  const prodSel = document.getElementById("sel-product");
  prodSel.innerHTML = "";
  mDef.products.forEach(p => {
    const o = document.createElement("option"); o.value = p.product_id; o.textContent = p.label;
    prodSel.appendChild(o);
  });
  prodSel.onchange = () => onProductChange(prodSel.value);
  await onProductChange(mDef.products[0].product_id);
}

async function onProductChange(productId) {
  stopLoop();
  curProduct = productId;
  document.getElementById("sel-product").value = productId;
  const mDef = registry.find(m => m.model_id === curModel);
  const pDef = mDef.products.find(p => p.product_id === productId);

  const regionBar = document.getElementById("regionbar");
  regionBar.style.display = pDef.group === "froude" ? "flex" : "none";
  document.querySelectorAll("#regionbar button").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll("#regionbar button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      onProductChange(btn.dataset.region);
    };
  });

  curUnits = pDef.units;
  document.title = `${mDef.label} — ${pDef.label}`;
  updateMapInfo();
  renderLegend(pDef.legend);
  await loadStatus();
}

async function loadStatus() {
  const status = await fetch(`/api/status/${curModel}/${curProduct}`).then(r => r.json());
  const cycleSel = document.getElementById("sel-cycle");

  const previousCycle = curCycle;
  cycleSel.innerHTML = "";
  status.cycles.forEach(c => {
    const o = document.createElement("option");
    o.value = c.cycle_utc;
    o.textContent = `${c.cycle_utc.replace("+00:00","Z")}  (${c.pct_complete}% ready)`;
    cycleSel.appendChild(o);
  });

  const match = status.cycles.find(c => c.cycle_utc === previousCycle);
  curCycle = match ? previousCycle : status.cycles[0].cycle_utc;
  cycleSel.value = curCycle;

  const cycleData = match || status.cycles[0];
  const avail = cycleData.available_hours;
  renderHourStrip(avail);
  cycleSel.onchange = () => { curCycle = cycleSel.value; loadStatus(); };
  curFxx = avail.includes(1) ? 1 : avail[0];
  await loadImage(curFxx);
}

async function loadImage(fxx) {
  curFxx = fxx;
  setBadge("loading…", "#e3b341");
  showLoading("Rendering…");

  const opacity = document.getElementById("opacity-slider").value / 100;
  const url = `/api/image/${curModel}/${curProduct}/${encodeURIComponent(curCycle)}/${fxx}?t=${Date.now()}`;
  if (imageOverlay) map.removeLayer(imageOverlay);
  imageOverlay = L.imageOverlay(url, IMAGE_BOUNDS, { opacity, interactive: false, pane: "modelPane" }).addTo(map);

  imageOverlay.once("load",  () => { hideLoading(); setBadge("100% ready", "#3fb950"); });
  imageOverlay.once("error", () => { hideLoading(); setBadge("error", "#f85149"); });

  if (barbOverlay) { map.removeLayer(barbOverlay); barbOverlay = null; }
  const mDef = registry.find(m => m.model_id === curModel);
  const pDef = mDef.products.find(p => p.product_id === curProduct);
  if (pDef.supports_barbs) {
    const barbUrl = `/api/barbs/${curModel}/${curProduct}/${encodeURIComponent(curCycle)}/${fxx}?t=${Date.now()}`;
    barbOverlay = L.imageOverlay(barbUrl, IMAGE_BOUNDS, { opacity: 1.0, interactive: false, pane: "modelPane" }).addTo(map);
  }

  statesLayer.bringToFront();
  artccLayer.bringToFront();

  fetch(`/api/points/${curModel}/${curProduct}/${encodeURIComponent(curCycle)}/${fxx}`)
    .then(r => r.json()).then(d => {
      buildKdTree(d.points);
      curValidUtc = (d.valid_utc || "").replace("+00:00","Z");
      updateMapInfo();
    });
}

/* ── map info overlay ── */
function updateMapInfo() {
  const mDef = registry.find(m => m.model_id === curModel);
  const pDef = mDef ? mDef.products.find(p => p.product_id === curProduct) : null;
  const cycleShort = (curCycle || "").replace("+00:00","Z");
  document.getElementById("mi-model").textContent =
    mDef ? `${mDef.label}  —  ${pDef ? pDef.label : ""}` : "";
  document.getElementById("mi-cycle").textContent =
    cycleShort ? `Cycle: ${cycleShort}` : "";
  document.getElementById("mi-valid").textContent =
    curValidUtc ? `Valid: ${curValidUtc}  (F${String(curFxx).padStart(2,"0")})` : "";
}

/* ── badges / loading ── */
function setBadge(t, c) {
  const el = document.getElementById("ready-badge");
  el.textContent = t; el.style.color = c;
}
function showLoading(msg) {
  document.getElementById("map-loading-msg").textContent = msg || "Rendering…";
  document.getElementById("map-loading").style.display = "block";
}
function hideLoading() {
  document.getElementById("map-loading").style.display = "none";
}

/* ── kd-tree ── */
function buildKdTree(pts) {
  const arr = new Float32Array(pts.length * 3);
  pts.forEach((p, i) => { arr[i*3]=p.lat; arr[i*3+1]=p.lon; arr[i*3+2]=p.value; });
  pointsData = arr;
}
function nearestValue(lat, lon) {
  if (!pointsData) return null;
  const n = pointsData.length / 3;
  let best = Infinity, val = null;
  for (let i = 0; i < n; i++) {
    const d = (pointsData[i*3]-lat)**2 + (pointsData[i*3+1]-lon)**2;
    if (d < best) { best = d; val = pointsData[i*3+2]; }
  }
  return val;
}

/* ── cursor tooltip ── */
map.on("mousemove", e => {
  const v = nearestValue(e.latlng.lat, e.latlng.lng);
  const tip = document.getElementById("cursor-tip");
  if (v !== null) {
    const lat = Math.abs(e.latlng.lat).toFixed(2);
    const lon = Math.abs(e.latlng.lng).toFixed(2);
    const ns  = e.latlng.lat  >= 0 ? "N" : "S";
    const ew  = e.latlng.lng  <= 0 ? "W" : "E";
    tip.innerHTML = `<b>${v.toFixed(1)} ${curUnits}</b><br>${lat}°${ns}  ${lon}°${ew}`;
    const mapEl = document.getElementById("map");
    const mw = mapEl.offsetWidth, mh = mapEl.offsetHeight;
    let tx = e.containerPoint.x + 14;
    let ty = e.containerPoint.y - 14;
    if (tx + 170 > mw) tx = e.containerPoint.x - 174;
    if (ty + 54  > mh) ty = e.containerPoint.y - 58;
    tip.style.left = tx + "px";
    tip.style.top  = ty + "px";
    tip.style.display = "block";
  } else {
    tip.style.display = "none";
  }
});
map.on("mouseout", () => {
  document.getElementById("cursor-tip").style.display = "none";
});

/* ── keyboard nav ── */
document.addEventListener("keydown", e => {
  if (e.key !== "ArrowRight" && e.key !== "ArrowLeft") return;
  e.preventDefault();
  const btns = [...document.querySelectorAll(".fxx-btn:not(.nav-btn)")];
  if (!btns.length) return;
  const i = btns.findIndex(b => b.classList.contains("active"));
  if (e.key === "ArrowRight" && i < btns.length-1) btns[i+1].click();
  if (e.key === "ArrowLeft"  && i > 0)             btns[i-1].click();
});

/* ── legend ── */
function renderLegend(legend) {
  const el = document.getElementById("map-legend");
  el.innerHTML = "";
  (legend||[]).forEach(item => {
    const sw = document.createElement("div");
    sw.className = "leg-swatch";
    sw.style.background = item.color;
    const lb = document.createElement("span");
    lb.className = "leg-label";
    lb.textContent = item.label;
    el.appendChild(sw);
    el.appendChild(lb);
  });
}

boot();
</script>
</body>
</html>
